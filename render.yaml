services:
  - type: web
    name: autoskill
    env: node
    buildCommand: cd backend && npm run build:all
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
databases:
  - name: autoskill-db
    databaseName: autoskill
    user: autoskill
